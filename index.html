<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>旺州物料数据中枢 (V11 旗舰版)</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        /* ================= 旗舰版：现代 SaaS 企业级主题变量 ================= */
        :root {
            /* 极简黑灰色系 (参考 Vercel/Stripe 暗色模式) */
            --bg-base: #09090b; /* Zinc 950 */
            --bg-card: #18181b; /* Zinc 900 */
            --bg-hover: #27272a; /* Zinc 800 */
            
            --border-subtle: #27272a;
            --border-focus: #3f3f46;
            
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            
            /* 品牌点缀色：低饱和度、高级感 */
            --brand-blue: #3b82f6;
            --brand-blue-hover: #2563eb;
            --brand-indigo: #6366f1;
            --brand-emerald: #10b981;
            --brand-amber: #f59e0b;
            --brand-rose: #f43f5e;
            
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
        }

        /* ================= 基础重置 ================= */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-base); color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased; 
            overflow-x: hidden; min-height: 100vh;
        }
        
        /* 隐藏滚动条但保留功能 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-focus); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #52525b; }

        .app-layout { max-width: 1600px; margin: 0 auto; padding: 24px; display: flex; flex-direction: column; gap: 24px; }

        /* ================= 顶部导航 ================= */
        header {
            display: flex; justify-content: space-between; align-items: center; 
            padding-bottom: 16px; border-bottom: 1px solid var(--border-subtle);
            flex-wrap: wrap; gap: 16px;
        }
        .brand { display: flex; align-items: center; gap: 12px; }
        .brand-logo { 
            width: 36px; height: 36px; border-radius: 10px; 
            background: linear-gradient(135deg, var(--brand-blue), var(--brand-indigo));
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 18px; letter-spacing: -1px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.2);
        }
        .brand-text h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.5px; margin: 0; }
        .brand-text p { font-size: 12px; color: var(--text-secondary); margin: 2px 0 0 0; }

        .header-actions { display: flex; gap: 10px; align-items: center; }
        
        /* 按钮组件 */
        .btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 8px 14px; font-size: 13px; font-weight: 500;
            border-radius: var(--radius-md); border: 1px solid var(--border-subtle);
            background: var(--bg-card); color: var(--text-primary);
            cursor: pointer; transition: all 0.2s ease;
            box-shadow: var(--shadow-sm); outline: none;
        }
        .btn:hover { background: var(--bg-hover); border-color: var(--border-focus); }
        .btn:active { transform: scale(0.98); }
        
        .btn-primary { background: var(--brand-blue); color: white; border: 1px solid transparent; }
        .btn-primary:hover { background: var(--brand-blue-hover); border-color: transparent; }
        
        .btn-danger { color: var(--brand-rose); border-color: rgba(244, 63, 94, 0.2); background: rgba(244, 63, 94, 0.05); }
        .btn-danger:hover { background: rgba(244, 63, 94, 0.1); border-color: rgba(244, 63, 94, 0.3); }

        .badge-status { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; background: var(--bg-card); border: 1px solid var(--border-subtle); color: var(--text-secondary); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-secondary); }
        .status-active { background: var(--brand-emerald); box-shadow: 0 0 8px rgba(16, 185, 129, 0.4); }

        /* ================= 搜索中控区 ================= */
        .search-bar {
            display: flex; align-items: center; gap: 12px;
            background: var(--bg-card); border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg); padding: 12px 20px;
            box-shadow: var(--shadow-sm); transition: border-color 0.2s;
        }
        .search-bar:focus-within { border-color: var(--brand-blue); box-shadow: 0 0 0 1px var(--brand-blue); }
        .search-icon { color: var(--text-secondary); }
        .search-input { 
            flex: 1; background: transparent; border: none; 
            color: var(--text-primary); font-size: 15px; outline: none; 
            min-width: 0; 
        }
        .search-input::placeholder { color: var(--text-secondary); }
        
        /* ================= 数据指标卡片 (KPI) ================= */
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
        .kpi-card {
            background: var(--bg-card); border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg); padding: 20px;
            display: flex; flex-direction: column; gap: 8px;
            box-shadow: var(--shadow-sm);
        }
        .kpi-header { display: flex; justify-content: space-between; align-items: center; color: var(--text-secondary); font-size: 13px; font-weight: 500; }
        .kpi-value { font-size: 32px; font-weight: 700; letter-spacing: -1px; color: var(--text-primary); }
        
        /* 微型进度条 */
        .progress-track { width: 100%; height: 4px; background: var(--bg-hover); border-radius: 2px; margin-top: 8px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 2px; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .fill-blue { background: var(--brand-blue); }
        .fill-emerald { background: var(--brand-emerald); }
        .fill-amber { background: var(--brand-amber); }

        /* ================= BI 图表区 ================= */
        .chart-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; height: 360px; }
        .chart-card {
            background: var(--bg-card); border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg); padding: 20px;
            box-shadow: var(--shadow-sm); display: flex; flex-direction: column;
            position: relative;
        }
        .chart-title { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 16px; }
        .chart-container { flex: 1; min-height: 0; width: 100%; }

        /* ================= 数据台表格 ================= */
        .table-card {
            background: var(--bg-card); border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg); overflow: hidden;
            box-shadow: var(--shadow-sm); display: flex; flex-direction: column;
        }
        .table-toolbar {
            padding: 16px 20px; border-bottom: 1px solid var(--border-subtle);
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;
        }
        .table-toolbar h3 { font-size: 15px; font-weight: 600; margin: 0; }
        
        .table-scroll { overflow-x: auto; overflow-y: auto; max-height: 600px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; min-width: 900px; }
        th { 
            position: sticky; top: 0; z-index: 10;
            background: rgba(24, 24, 27, 0.95); backdrop-filter: blur(8px);
            color: var(--text-secondary); font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px;
            padding: 12px 20px; text-align: left; border-bottom: 1px solid var(--border-subtle);
        }
        td { padding: 14px 20px; font-size: 14px; color: var(--text-primary); border-bottom: 1px solid var(--border-subtle); transition: background-color 0.15s; }
        
        tbody tr:hover td { background: var(--bg-hover); }
        
        /* 分类标签 Badge */
        .cat-badge { display: inline-flex; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 500; }
        .cat-badge.elec { background: rgba(59, 130, 246, 0.15); color: #60a5fa; }
        .cat-badge.mech { background: rgba(16, 185, 129, 0.15); color: #34d399; }
        .cat-badge.fast { background: rgba(245, 158, 11, 0.15); color: #fbbf24; }
        .cat-badge.pack { background: rgba(99, 102, 241, 0.15); color: #818cf8; }
        .cat-badge.default { background: rgba(161, 161, 170, 0.15); color: #a1a1aa; }

        /* 搜索高亮 */
        .highlight { background-color: rgba(234, 179, 8, 0.3); color: #fde047; padding: 0 2px; border-radius: 2px; font-weight: 600; }
        
        /* 单元格编辑态 */
        td.editable { position: relative; }
        td.editable:hover { cursor: text; box-shadow: inset 0 0 0 1px var(--border-focus); }
        td.editable:focus { outline: none; background: rgba(59, 130, 246, 0.05); box-shadow: inset 0 0 0 2px var(--brand-blue); border-radius: 4px; }
        
        .action-link { color: var(--text-secondary); font-size: 13px; cursor: pointer; text-decoration: none; transition: color 0.2s; }
        .action-link:hover { color: var(--brand-rose); }

        /* ================= 鉴权模态框 ================= */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); align-items: center; justify-content: center; z-index: 1000; opacity: 0; transition: opacity 0.2s; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-card { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-xl); padding: 32px; width: 100%; max-width: 380px; box-shadow: var(--shadow-lg); transform: scale(0.95); transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .modal-overlay.active .modal-card { transform: scale(1); }
        
        .modal-header { text-align: center; margin-bottom: 24px; }
        .modal-icon { width: 48px; height: 48px; background: rgba(59, 130, 246, 0.1); color: var(--brand-blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px auto; font-size: 24px; }
        .modal-title { font-size: 18px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
        .modal-desc { font-size: 13px; color: var(--text-secondary); }
        
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; font-weight: 500; }
        .form-input { width: 100%; padding: 10px 14px; background: var(--bg-base); border: 1px solid var(--border-subtle); color: var(--text-primary); border-radius: var(--radius-md); font-size: 14px; transition: all 0.2s; outline: none; }
        .form-input:focus { border-color: var(--brand-blue); box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
        .form-err { color: var(--brand-rose); font-size: 12px; margin-top: 8px; text-align: center; display: none; }

        /* ================= 提示 Toast ================= */
        .toast-container { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 10px; z-index: 9999; pointer-events: none; }
        .toast { background: var(--bg-card); border: 1px solid var(--border-subtle); box-shadow: var(--shadow-lg); padding: 12px 16px; border-radius: var(--radius-md); display: flex; align-items: center; gap: 10px; transform: translateX(120%); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .toast.show { transform: translateX(0); }
        .toast-icon { display: flex; align-items: center; justify-content: center; width: 20px; height: 20px; border-radius: 50%; font-size: 12px; font-weight: bold; }
        .toast-success .toast-icon { background: rgba(16, 185, 129, 0.2); color: var(--brand-emerald); }
        .toast-info .toast-icon { background: rgba(59, 130, 246, 0.2); color: var(--brand-blue); }

        /* 响应式调整 */
        @media (max-width: 1024px) { .chart-grid { grid-template-columns: 1fr; height: auto; } .chart-card { height: 320px; } }
        @media (max-width: 768px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } .search-bar { flex-direction: column; align-items: stretch; } }
        @media (max-width: 480px) { .kpi-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="app-layout">
        <!-- 头部导航 -->
        <header>
            <div class="brand">
                <div class="brand-logo">W</div>
                <div class="brand-text">
                    <h1>旺州物料资产中枢</h1>
                    <p>Enterprise Data Platform V11.0</p>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn" onclick="exportToCSV()">
                    <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    导出 CSV
                </button>
                <div class="badge-status" id="auth-badge">
                    <div class="status-dot"></div>
                    <span id="auth-text">访客只读</span>
                </div>
                <button class="btn btn-primary" id="btn-login" onclick="showLogin()">身份验证</button>
                <button class="btn btn-danger" id="btn-logout" style="display: none;" onclick="logout()">退出系统</button>
            </div>
        </header>

        <!-- 全局搜索引擎 -->
        <div class="search-bar">
            <svg class="search-icon" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            <input type="text" id="search-input" class="search-input" placeholder="键入编码、名称、分类进行全库检索，或点击下方图表进行交互式过滤..." autocomplete="off">
            <button class="btn" style="border: none; box-shadow: none; color: var(--text-secondary);" onclick="clearSearch()">清除</button>
        </div>

        <!-- 核心业务指标 (KPIs) -->
        <div class="kpi-grid">
            <div class="kpi-card">
                <div class="kpi-header"><span>当前视图数据量 (SKU)</span><svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"></path></svg></div>
                <div class="kpi-value" id="val-total">0</div>
                <div class="progress-track"><div class="progress-fill fill-blue" style="width: 100%"></div></div>
            </div>
            <div class="kpi-card">
                <div class="kpi-header"><span>涉及物料分类域</span><svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg></div>
                <div class="kpi-value" id="val-cat">0</div>
                <div class="progress-track"><div class="progress-fill fill-blue" id="bar-cat" style="width: 0%"></div></div>
            </div>
            <div class="kpi-card">
                <div class="kpi-header"><span>规格参数闭环率</span><svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg></div>
                <div class="kpi-value" id="val-spec" style="color: var(--brand-emerald);">0%</div>
                <div class="progress-track"><div class="progress-fill fill-emerald" id="bar-spec" style="width: 0%"></div></div>
            </div>
            <div class="kpi-card">
                <div class="kpi-header"><span>补充备注留存率</span><svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg></div>
                <div class="kpi-value" id="val-remark" style="color: var(--brand-amber);">0%</div>
                <div class="progress-track"><div class="progress-fill fill-amber" id="bar-remark" style="width: 0%"></div></div>
            </div>
        </div>

        <!-- 商业智能 (BI) 仪表盘 -->
        <div class="chart-grid">
            <div class="chart-card">
                <div class="chart-title">领域结构模型 (可点击下钻)</div>
                <div id="pie-chart" class="chart-container"></div>
            </div>
            <div class="chart-card">
                <div class="chart-title">资产属性生命周期分析</div>
                <div id="bar-chart" class="chart-container"></div>
            </div>
        </div>

        <!-- 数据交互表 -->
        <div class="table-card">
            <div class="table-toolbar">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <h3>主数据矩阵库</h3>
                    <span id="edit-hint" style="font-size: 12px; color: var(--brand-emerald); background: rgba(16, 185, 129, 0.1); padding: 2px 8px; border-radius: 12px; display: none;">写权限已开启</span>
                </div>
                <div style="display: flex; gap: 8px;">
                    <button class="btn" id="btn-save" style="display: none;" onclick="forceSave()">💾 固化数据</button>
                    <button class="btn btn-primary" id="btn-add" style="display: none;" onclick="addRow()">+ 新增物料</button>
                </div>
            </div>
            <div class="table-scroll">
                <table id="data-table">
                    <thead>
                        <tr>
                            <th style="width: 15%">物料编码 (KEY)</th>
                            <th style="width: 12%">归属域 (DOMAIN)</th>
                            <th style="width: 20%">标准名称 (NAME)</th>
                            <th style="width: 25%">技术规格 (SPEC)</th>
                            <th style="width: 20%">补充信息 (REMARKS)</th>
                            <th class="col-actions admin-col" style="display:none; width: 8%">操作</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 鉴权模态框 -->
    <div class="modal-overlay" id="login-modal">
        <div class="modal-card">
            <div class="modal-header">
                <div class="modal-icon">
                    <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                </div>
                <h3 class="modal-title">管理员鉴权</h3>
                <p class="modal-desc">系统主数据由安全策略保护，修改需验证身份。</p>
            </div>
            <div class="form-group">
                <label>身份标识 (ID)</label>
                <input type="text" id="username" class="form-input" placeholder="输入分配的系统账号" autocomplete="off">
            </div>
            <div class="form-group">
                <label>安全凭证 (KEY)</label>
                <input type="password" id="password" class="form-input" placeholder="输入密钥">
            </div>
            <div id="login-err" class="form-err">鉴权拒绝：标识或凭证不匹配。</div>
            <button class="btn btn-primary" style="width: 100%; justify-content: center; padding: 10px; margin-top: 8px;" onclick="verifyLogin()">授权登入</button>
            <button class="btn" style="width: 100%; justify-content: center; margin-top: 12px; border: none;" onclick="hideLogin()">取消</button>
        </div>
    </div>

    <!-- 提示消息容器 -->
    <div class="toast-container" id="toast-container"></div>

    <script>

            // 解决 ECharts 容器宽高在初始帧未计算完成导致图表消失的问题
            setTimeout(() => {
                initCharts();
                
                const searchInput = document.getElementById('search-input');
                let timeout = null;
                searchInput.addEventListener('input', () => {
                    clearTimeout(timeout);
                    timeout = setTimeout(syncState, 200); 
                });

                window.addEventListener('resize', () => { 
                    if(pieChart) pieChart.resize(); 
                    if(barChart) barChart.resize(); 
                });
                
                syncState(); 
                createToast('系统引擎已就绪', 'success');
            }, 50); // 给 DOM 50ms 渲染时间
        };

        function initData() {
            const storedData = localStorage.getItem(STORAGE_KEY);
            if (storedData) {
                try { 
                    rawData = JSON.parse(storedData); 
                    if (!Array.isArray(rawData) || rawData.length === 0) { rawData = JSON.parse(JSON.stringify(originalData)); }
                } catch(e) { rawData = JSON.parse(JSON.stringify(originalData)); }
            } else {
                rawData = JSON.parse(JSON.stringify(originalData));
            }
            currentSearchTerm = document.getElementById('search-input').value.trim().toLowerCase();
        }

        // 统一状态同步出口
        function syncState() {
            currentSearchTerm = document.getElementById('search-input').value.trim().toLowerCase();
            
            if (!currentSearchTerm) {
                filteredData = [...rawData];
            } else {
                filteredData = rawData.filter(row => row.some(cell => String(cell || '').toLowerCase().includes(currentSearchTerm)));
            }
            
            renderDashboard();
            renderTable();
        }

        // ================= UI 辅助组件 =================
        function createToast(msg, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            
            const icon = type === 'success' ? '✓' : 'i';
            toast.innerHTML = `<div class="toast-icon">${icon}</div><div>${msg}</div>`;
            
            container.appendChild(toast);
            
            // 触发动画
            requestAnimationFrame(() => { toast.classList.add('show'); });
            
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function getCategoryBadge(cat) {
            let type = 'default';
            if (cat.includes('电气')) type = 'elec';
            else if (cat.includes('机械')) type = 'mech';
            else if (cat.includes('紧固')) type = 'fast';
            else if (cat.includes('包装')) type = 'pack';
            return `<span class="cat-badge ${type}">${cat}</span>`;
        }

        function clearSearch() {
            document.getElementById('search-input').value = '';
            syncState();
        }

        function autoSave() { localStorage.setItem(STORAGE_KEY, JSON.stringify(rawData)); }
        function forceSave() { autoSave(); createToast('数据快照已固化至本地存储', 'success'); }

        // ================= ECharts 渲染配置 =================
        function initCharts() {
            pieChart = echarts.init(document.getElementById('pie-chart'), 'dark');
            barChart = echarts.init(document.getElementById('bar-chart'), 'dark');
            
            // 使用透明背景适配我们的面板颜色
            pieChart.setOption({ backgroundColor: 'transparent' });
            barChart.setOption({ backgroundColor: 'transparent' });

            pieChart.on('click', function(params) {
                document.getElementById('search-input').value = params.name;
                syncState();
                createToast(`已联动过滤：${params.name}`, 'info');
            });

            barChart.on('click', function(params) {
                document.getElementById('search-input').value = params.name;
                syncState();
                createToast(`已联动过滤：${params.name}`, 'info');
            });
        }

        function renderDashboard() {
            let stats = {};
            let specCount = 0, remarkCount = 0;

            filteredData.forEach(row => {
                let cat = row[1] || '未分配';
                if (!stats[cat]) stats[cat] = { total: 0, spec: 0, remark: 0 };
                stats[cat].total++;
                if (row[3] && row[3].trim() !== '') { stats[cat].spec++; specCount++; }
                if (row[4] && row[4].trim() !== '') { stats[cat].remark++; remarkCount++; }
            });

            const totalRows = filteredData.length;
            const categories = Object.keys(stats);
            
            const specRate = totalRows ? ((specCount/totalRows)*100).toFixed(1) : 0;
            const remarkRate = totalRows ? ((remarkCount/totalRows)*100).toFixed(1) : 0;
            const catRate = categories.length > 0 ? (categories.length / 4 * 100) : 0; // 假设总共有4大类

            // 更新 KPI 卡片及进度条
            document.getElementById('val-total').innerText = totalRows;
            document.getElementById('val-cat').innerText = categories.length;
            document.getElementById('bar-cat').style.width = `${Math.min(100, catRate)}%`;
            
            document.getElementById('val-spec').innerText = `${specRate}%`;
            document.getElementById('bar-spec').style.width = `${specRate}%`;
            
            document.getElementById('val-remark').innerText = `${remarkRate}%`;
            document.getElementById('bar-remark').style.width = `${remarkRate}%`;

            const isMobile = window.innerWidth <= 768;
            const textStyle = { color: '#a1a1aa', fontSize: 11, fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI"' };

            // 高级甜甜圈图配置
            pieChart.setOption({
                tooltip: { trigger: 'item', backgroundColor: '#18181b', borderColor: '#27272a', textStyle: { color: '#fafafa' } },
                legend: { show: true, bottom: 0, icon: 'circle', itemWidth: 8, itemHeight: 8, textStyle: textStyle, selectedMode: false },
                series: [{
                    type: 'pie', 
                    radius: isMobile ? ['40%', '70%'] : ['50%', '80%'],
                    center: ['50%', '45%'],
                    avoidLabelOverlap: false,
                    itemStyle: { borderRadius: 4, borderColor: '#18181b', borderWidth: 2 },
                    label: { show: false }, // 极简风格，不显示连线
                    data: categories.map(c => ({ name: c, value: stats[c].total }))
                }]
            });

            // 高级柱状图配置
            barChart.setOption({
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' }, backgroundColor: '#18181b', borderColor: '#27272a', textStyle: { color: '#fafafa' } },
                legend: { selectedMode: false, data: ['库存量', '含规格', '含备注'], top: 0, right: 0, icon: 'circle', itemWidth: 8, itemHeight: 8, textStyle: textStyle },
                grid: { left: '0%', right: '0%', bottom: '5%', top: '15%', containLabel: true },
                xAxis: { type: 'category', data: categories, axisLabel: { color: '#a1a1aa', interval: 0, rotate: isMobile ? 30 : 0, fontSize: 11 }, axisLine: { show: false }, axisTick: { show: false } },
                yAxis: { type: 'value', axisLabel: { color: '#71717a', fontSize: 11 }, splitLine: { lineStyle: { color: '#27272a', type: 'dashed' } } },
                series: [
                    { name: '库存量', type: 'bar', data: categories.map(c => stats[c].total), barWidth: '15%', itemStyle: { color: '#3b82f6', borderRadius: [4, 4, 0, 0] } },
                    { name: '含规格', type: 'bar', data: categories.map(c => stats[c].spec), barWidth: '15%', itemStyle: { color: '#10b981', borderRadius: [4, 4, 0, 0] } },
                    { name: '含备注', type: 'bar', data: categories.map(c => stats[c].remark), barWidth: '15%', itemStyle: { color: '#f59e0b', borderRadius: [4, 4, 0, 0] } }
                ]
            });
        }

        // ================= 数据台渲染引擎 =================
        function highlightText(text) {
            if (!currentSearchTerm || !text) return text;
            const strText = String(text);
            const regex = new RegExp(`(${currentSearchTerm.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            return strText.replace(regex, '<span class="highlight">$1</span>');
        }

        function renderTable() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            
            const fragment = document.createDocumentFragment();

            filteredData.forEach((row) => {
                const realIndex = rawData.indexOf(row);
                if (realIndex === -1) return; 

                const tr = document.createElement('tr');
                let html = '';
                
                // 列0: 编码
                let cell0 = highlightText(row[0]);
                html += isAdmin ? `<td class="editable" contenteditable="true" onfocus="this.innerText=rawData[${realIndex}][0]" onblur="updateCell(${realIndex}, 0, this.innerText)">${cell0}</td>` : `<td style="font-family: monospace; color: var(--text-secondary);">${cell0}</td>`;
                
                // 列1: 分类 (使用 Badge)
                let cell1 = row[1];
                html += isAdmin ? `<td class="editable" contenteditable="true" onfocus="this.innerText=rawData[${realIndex}][1]" onblur="updateCell(${realIndex}, 1, this.innerText)">${cell1}</td>` : `<td>${getCategoryBadge(cell1)}</td>`;
                
                // 列2, 3, 4
                for(let i=2; i<=4; i++) {
                    let cellContent = highlightText(row[i]);
                    html += isAdmin ? `<td class="editable" contenteditable="true" onfocus="this.innerText=rawData[${realIndex}][${i}]" onblur="updateCell(${realIndex}, ${i}, this.innerText)">${cellContent}</td>` : `<td>${cellContent}</td>`;
                }
                
                // 操作列
                html += isAdmin ? `<td class="col-actions admin-col"><a class="action-link" onclick="deleteRow(${realIndex})">移除</a></td>` : `<td class="col-actions admin-col" style="display:none;"></td>`;
                
                tr.innerHTML = html;
                fragment.appendChild(tr);
            });
            
            tbody.appendChild(fragment);

            const adminCols = document.querySelectorAll('.admin-col');
            adminCols.forEach(col => col.style.display = isAdmin ? 'table-cell' : 'none');
        }

        function updateCell(realIndex, colIndex, value) {
            const safeVal = value.trim();
            if (rawData[realIndex][colIndex] !== safeVal) {
                rawData[realIndex][colIndex] = safeVal;
                autoSave(); 
                syncState(); 
            } else {
                renderTable(); 
            }
        }

        function addRow() {
            const newId = String(Math.floor(Math.random()*10000)).padStart(4, '0');
            const newRow = [`WZ-NEW-${newId}`, '电气件', '新录入主数据', '', ''];
            rawData.unshift(newRow);
            autoSave();
            
            if (currentSearchTerm) { clearSearch(); }
            else { syncState(); }
            
            document.querySelector('.table-scroll').scrollTop = 0;
            createToast('新资产条目已在列首生成', 'success');
        }

        function deleteRow(realIndex) {
            if (confirm('数据安全警告：确认从底表中永久抹除此条目？')) {
                rawData.splice(realIndex, 1);
                autoSave();
                syncState();
                createToast('条目已安全移除', 'info');
            }
        }

        // ================= 导出功能 =================
        function triggerDownload(content, filename, mimeType) {
            const blob = new Blob([content], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = filename;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function exportToCSV() {
            let csvContent = "\uFEFF物料编码,分类,物料名称,规格/参数,补充信息\n";
            filteredData.forEach(row => {
                let formattedRow = row.map(cell => {
                    let safeCell = String(cell || '').replace(/"/g, '""');
                    if (safeCell.includes(',') || safeCell.includes('\n') || safeCell.includes('"')) return `"${safeCell}"`;
                    return safeCell;
                });
                csvContent += formattedRow.join(',') + "\n";
            });
            triggerDownload(csvContent, '旺州资产_数据快照.csv', 'text/csv;charset=utf-8;');
            createToast('CSV 数据集生成完毕', 'success');
        }

        // ================= 权限中心 =================
        function showLogin() { 
            const overlay = document.getElementById('login-modal');
            overlay.classList.add('active'); 
            document.getElementById('login-err').style.display = 'none'; 
        }
        
        function hideLogin() { 
            document.getElementById('login-modal').classList.remove('active'); 
        }
        
        function verifyLogin() {
            // System Auth Check
            if (document.getElementById('username').value === '旺州仓库' && document.getElementById('password').value === '2530049443') {
                isAdmin = true;
                hideLogin();
                
                // UI 反馈
                document.getElementById('auth-text').innerText = '系统管理员';
                document.getElementById('auth-badge').style.borderColor = 'var(--brand-emerald)';
                document.getElementById('auth-badge').style.color = 'var(--brand-emerald)';
                document.querySelector('.status-dot').classList.add('status-active');
                
                document.getElementById('btn-login').style.display = 'none';
                document.getElementById('btn-logout').style.display = 'inline-flex';
                document.getElementById('btn-add').style.display = 'inline-flex';
                document.getElementById('btn-save').style.display = 'inline-flex';
                document.getElementById('edit-hint').style.display = 'inline';
                
                syncState(); // 同步表格使其进入编辑模式
                createToast('身份核验通过，数据写权限已解锁', 'success');
            } else {
                document.getElementById('login-err').style.display = 'block';
            }
        }

        function logout() {
            isAdmin = false;
            
            // UI 反馈恢复
            document.getElementById('auth-text').innerText = '访客只读';
            document.getElementById('auth-badge').style.borderColor = 'var(--border-subtle)';
            document.getElementById('auth-badge').style.color = 'var(--text-secondary)';
            document.querySelector('.status-dot').classList.remove('status-active');
            
            document.getElementById('btn-login').style.display = 'inline-flex';
            document.getElementById('btn-logout').style.display = 'none';
            document.getElementById('btn-add').style.display = 'none';
            document.getElementById('btn-save').style.display = 'none';
            document.getElementById('edit-hint').style.display = 'none';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            
            syncState(); 
            createToast('已安全登出并锁定写操作', 'info');
        }
    </script>
</body>
</html>
