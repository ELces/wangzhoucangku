<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 关键：添加完美的 viewport 适配移动端 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>旺州仓库 - 智能数据大屏 (V6 移动适配版)</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        /* ================= 主题变量 ================= */
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151b2b;
            --border-color: #2a3441;
            --text-main: #e2e8f0;
            --text-sub: #94a3b8;
            --accent: #00f2ff;
            --danger: #ef4444;
            --success: #10b981;
            --th-bg: #1e2638;
            --input-bg: #0b0f19;
        }
        body.light-theme {
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --border-color: #e5e7eb;
            --text-main: #1f2937;
            --text-sub: #6b7280;
            --accent: #2563eb;
            --th-bg: #f9fafb;
            --input-bg: #f9fafb;
        }

        /* ================= 基础重置 ================= */
        body { margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-main); font-family: 'Segoe UI', system-ui, sans-serif; transition: background-color 0.3s, color 0.3s; overflow-x: hidden; }
        * { box-sizing: border-box; }
        
        /* ================= 布局组件 ================= */
        header { background: var(--card-bg); padding: 15px 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; transition: all 0.3s; flex-wrap: wrap; gap: 15px; }
        .title { font-size: 18px; font-weight: bold; color: var(--accent); letter-spacing: 1px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .header-controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        
        .btn { background: transparent; color: var(--accent); border: 1px solid var(--accent); padding: 8px 14px; border-radius: 4px; cursor: pointer; transition: all 0.3s; font-size: 13px; display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; }
        .btn:hover { background: rgba(0, 242, 255, 0.1); box-shadow: 0 0 10px rgba(0,242,255,0.2); }
        body.light-theme .btn:hover { background: rgba(37, 99, 235, 0.1); box-shadow: none; }
        .btn-danger { color: var(--danger); border-color: var(--danger); }
        .btn-danger:hover { background: rgba(239, 68, 68, 0.1); }
        .btn-success { color: var(--success); border-color: var(--success); }
        .btn-success:hover { background: rgba(16, 185, 129, 0.1); }

        .container { padding: 15px; max-width: 1800px; margin: 0 auto; width: 100%; }
        
        /* 搜索栏 */
        .search-wrapper { margin-bottom: 20px; display: flex; gap: 10px; align-items: center; background: var(--card-bg); padding: 12px 15px; border-radius: 8px; border: 1px solid var(--border-color); }
        .search-input { flex: 1; padding: 10px 15px; border-radius: 30px; border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-main); font-size: 14px; outline: none; width: 100%; }
        .search-input:focus { border-color: var(--accent); }
        .search-stats { color: var(--text-sub); font-size: 13px; white-space: nowrap; }

        /* 统计卡片 */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--card-bg); border: 1px solid var(--border-color); padding: 15px; border-radius: 8px; text-align: center; }
        .stat-value { font-size: 24px; font-weight: bold; color: var(--accent); margin-top: 8px; }
        
        /* 图表区 */
        .charts-wrapper { display: flex; gap: 15px; margin-bottom: 20px; height: 350px; width: 100%; }
        .chart-box { flex: 1; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 10px; min-width: 0; } /* min-width:0 解决flex溢出 */
        
        /* 表格区 */
        .table-section { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; }
        .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        .table-wrapper { max-height: 550px; overflow-y: auto; overflow-x: auto; border: 1px solid var(--border-color); border-radius: 4px; -webkit-overflow-scrolling: touch; }
        
        table { width: 100%; border-collapse: collapse; text-align: left; min-width: 800px; } /* 保证表格在小屏幕下可以横向滚动而不被挤压 */
        th, td { padding: 10px 12px; border-bottom: 1px solid var(--border-color); font-size: 14px; }
        th { background: var(--th-bg); color: var(--text-sub); position: sticky; top: 0; z-index: 10; font-weight: 600; white-space: nowrap; }
        
        .highlight { background-color: rgba(255, 208, 0, 0.4); color: #fff; padding: 0 2px; border-radius: 2px; }
        body.light-theme .highlight { background-color: rgba(255, 208, 0, 0.6); color: #000; }
        td.editable:focus { background: rgba(0, 242, 255, 0.1); outline: 1px solid var(--accent); }
        .admin-col { text-align: center; width: 60px; white-space: nowrap; }
        .del-btn { color: var(--danger); cursor: pointer; text-decoration: underline; font-size: 13px; }
        
        /* 弹窗 & 提示 */
        #login-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal-content { background: var(--card-bg); border: 1px solid var(--accent); padding: 25px; border-radius: 8px; width: 100%; max-width: 320px; text-align: center; }
        .modal-content input { width: 100%; padding: 12px; margin: 10px 0; background: var(--bg-color); border: 1px solid var(--border-color); color: var(--text-main); box-sizing: border-box; border-radius: 4px; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translate(-50%, 100px); background: var(--success); color: white; padding: 10px 20px; border-radius: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); opacity: 0; transition: all 0.3s; z-index: 9999; white-space: nowrap; font-size: 14px; }
        .toast.show { transform: translate(-50%, 0); opacity: 1; }

        /* ================= 核心响应式适配 (Mobile & Tablet) ================= */
        @media (max-width: 1024px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
        
        @media (max-width: 768px) {
            header { flex-direction: column; align-items: flex-start; }
            .header-controls { width: 100%; justify-content: flex-start; overflow-x: auto; padding-bottom: 5px; -webkit-overflow-scrolling: touch; }
            .header-controls::-webkit-scrollbar { display: none; } /* 隐藏横向滚动条但保持可滑动 */
            
            .search-wrapper { flex-direction: column; align-items: stretch; }
            .search-stats { text-align: left; }
            
            .charts-wrapper { flex-direction: column; height: auto; }
            .chart-box { height: 300px; width: 100%; }
            
            .table-header { flex-direction: column; align-items: flex-start; }
            .table-header > div { width: 100%; display: flex; gap: 10px; }
            .table-header .btn { flex: 1; justify-content: center; }
        }
        
        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
            .stat-card { padding: 12px; }
            .title { font-size: 16px; }
            .btn { padding: 6px 10px; font-size: 12px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="title">📦 旺州智能大屏 <span style="font-size: 11px; background: var(--accent); color: #000; padding: 2px 6px; border-radius: 10px; font-weight: bold;">v6.0 移动端适配</span></div>
        <div class="header-controls">
            <button class="btn" onclick="toggleTheme()" id="theme-btn">☀️ 浅色</button>
            <button class="btn" onclick="exportToCSV()">📊 Excel</button>
            <button class="btn" onclick="exportToMD()">📝 MD</button>
            <span style="color: var(--border-color); display: none;">|</span>
            <span id="user-status" style="color: var(--text-sub); font-size: 12px; white-space: nowrap;">访客模式 (只读)</span>
            <button class="btn" id="login-btn" onclick="showLogin()">管理员</button>
            <button class="btn btn-danger" id="logout-btn" style="display: none;" onclick="logout()">退出</button>
        </div>
    </header>

    <div class="container">
        <!-- 搜索栏 -->
        <div class="search-wrapper">
            <span style="font-size: 18px;">🔍</span>
            <input type="text" id="search-input" class="search-input" placeholder="输入物料名称、编码、规格..." oninput="handleSearch()">
            <div class="search-stats" id="search-stats">显示: 0 项</div>
        </div>

        <!-- 统计指标 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div style="color: var(--text-sub); font-size: 13px;">检索结果总量</div>
                <div class="stat-value" id="val-total">0</div>
            </div>
            <div class="stat-card">
                <div style="color: var(--text-sub); font-size: 13px;">涉及分类数</div>
                <div class="stat-value" id="val-cat">0</div>
            </div>
            <div class="stat-card">
                <div style="color: var(--text-sub); font-size: 13px;">规格完善率</div>
                <div class="stat-value" id="val-spec">0%</div>
            </div>
            <div class="stat-card">
                <div style="color: var(--text-sub); font-size: 13px;">备注填充率</div>
                <div class="stat-value" id="val-remark">0%</div>
            </div>
        </div>

        <!-- 动态图表 -->
        <div class="charts-wrapper">
            <div class="chart-box" id="pie-chart"></div>
            <div class="chart-box" id="bar-chart"></div>
        </div>

        <!-- 表格 -->
        <div class="table-section">
            <div class="table-header">
                <h3 style="margin: 0; font-size: 16px;">
                    📝 数据台 <span id="edit-hint" style="font-size: 12px; color: var(--accent); display: none; font-weight: normal;">(✏️实时编辑中)</span>
                </h3>
                <div style="display: flex; gap: 8px;">
                    <button class="btn btn-success" id="save-btn" style="display: none;" onclick="forceSave()">💾 保存</button>
                    <button class="btn" id="add-btn" style="display: none;" onclick="addRow()">+ 录入</button>
                </div>
            </div>
            <div class="table-wrapper">
                <table id="data-table">
                    <thead>
                        <tr>
                            <th>物料编码</th><th>分类</th><th>物料名称</th><th>规格/参数</th><th>备注</th>
                            <th class="admin-col" style="display:none;">操作</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 弹窗 -->
    <div id="login-modal">
        <div class="modal-content">
            <h3 style="margin-top: 0; color: var(--accent);">身份核验</h3>
            <input type="text" id="username" placeholder="账号">
            <input type="password" id="password" placeholder="密码">
            <button class="btn" style="width: 100%; margin-top: 15px; justify-content: center;" onclick="verifyLogin()">确 认</button>
            <div id="login-err" style="color: var(--danger); font-size: 12px; margin-top: 10px; display: none;">账号或密码不匹配</div>
            <button class="btn" style="width: 100%; margin-top: 10px; border-color: var(--text-sub); color: var(--text-sub); justify-content: center;" onclick="hideLogin()">取 消</button>
        </div>
    </div>

    <div class="toast" id="sys-toast">数据操作成功</div>

                rawData = JSON.parse(JSON.stringify(originalData));
            }
            filteredData = [...rawData];
        }

        function autoSave() { localStorage.setItem(STORAGE_KEY, JSON.stringify(rawData)); }
        function forceSave() { autoSave(); showToast('✅ 数据已保存至本地！'); }

        let isAdmin = false;
        let isLightMode = false;
        let pieChart, barChart;

        function toggleTheme() {
            const body = document.body;
            isLightMode = !isLightMode;
            if (isLightMode) {
                body.classList.add('light-theme');
                document.getElementById('theme-btn').innerText = '🌙 深色';
            } else {
                body.classList.remove('light-theme');
                document.getElementById('theme-btn').innerText = '☀️ 浅色';
            }
            if(pieChart) pieChart.dispose();
            if(barChart) barChart.dispose();
            initCharts();
            updateDashboard();
        }

        function initCharts() {
            const themeStr = isLightMode ? 'light' : 'dark';
            pieChart = echarts.init(document.getElementById('pie-chart'), themeStr);
            barChart = echarts.init(document.getElementById('bar-chart'), themeStr);
            pieChart.setOption({ backgroundColor: 'transparent' });
            barChart.setOption({ backgroundColor: 'transparent' });
        }

        window.onload = () => {
            initData();
            initCharts();
            window.addEventListener('resize', () => { 
                if(pieChart) pieChart.resize(); 
                if(barChart) barChart.resize(); 
            });
            refreshSystem();
            showToast('欢迎使用 (手机适配版)');
        };

        function showToast(msg) {
            const toast = document.getElementById('sys-toast');
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function handleSearch() {
            currentSearchTerm = document.getElementById('search-input').value.trim().toLowerCase();
            if (!currentSearchTerm) {
                filteredData = [...rawData];
            } else {
                filteredData = rawData.filter(row => {
                    return row.some(cell => String(cell || '').toLowerCase().includes(currentSearchTerm));
                });
            }
            refreshSystem();
        }

        function highlightText(text) {
            if (!currentSearchTerm || !text) return text;
            const strText = String(text);
            const regex = new RegExp(`(${currentSearchTerm.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            return strText.replace(regex, '<span class="highlight">$1</span>');
        }

        function refreshSystem() {
            renderTable();
            updateDashboard();
        }

        function updateDashboard() {
            let stats = {};
            let specCount = 0, remarkCount = 0;

            filteredData.forEach(row => {
                let cat = row[1] || '未分类';
                if (!stats[cat]) stats[cat] = { total: 0, spec: 0, remark: 0 };
                stats[cat].total++;
                if (row[3] && row[3].trim() !== '') { stats[cat].spec++; specCount++; }
                if (row[4] && row[4].trim() !== '') { stats[cat].remark++; remarkCount++; }
            });

            const totalRows = filteredData.length;
            const categories = Object.keys(stats);

            document.getElementById('search-stats').innerText = `检索: ${totalRows} 项`;
            document.getElementById('val-total').innerText = totalRows;
            document.getElementById('val-cat').innerText = categories.length;
            document.getElementById('val-spec').innerText = totalRows ? ((specCount/totalRows)*100).toFixed(1) + '%' : '0%';
            document.getElementById('val-remark').innerText = totalRows ? ((remarkCount/totalRows)*100).toFixed(1) + '%' : '0%';

            const textColor = isLightMode ? '#374151' : '#e2e8f0';
            const isMobile = window.innerWidth <= 768;

            pieChart.setOption({
                title: { text: '物料分类占比', left: 'center', textStyle: { color: textColor, fontSize: 14 } },
                tooltip: { trigger: 'item' },
                series: [{
                    type: 'pie', radius: isMobile ? ['30%', '60%'] : ['45%', '75%'],
                    itemStyle: { borderRadius: 8, borderColor: isLightMode ? '#fff' : '#151b2b', borderWidth: 2 },
                    data: categories.map(c => ({ name: c, value: stats[c].total }))
                }]
            });

            barChart.setOption({
                title: { text: '属性完善状态', textStyle: { color: textColor, fontSize: 14 } },
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                legend: { data: ['SKU总量', '有规格', '有备注'], top: 25, itemWidth: 10, itemHeight: 10, textStyle: { color: textColor, fontSize: 10 } },
                grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                xAxis: { type: 'category', data: categories, axisLabel: { color: textColor, interval: 0, rotate: isMobile ? 30 : 0, fontSize: 10 } },
                yAxis: { type: 'value', axisLabel: { color: textColor }, splitLine: { lineStyle: { color: isLightMode ? '#e5e7eb' : '#2a3441' } } },
                series: [
                    { name: 'SKU总量', type: 'bar', data: categories.map(c => stats[c].total), itemStyle: { color: isLightMode ? '#3b82f6' : '#00f2ff' } },
                    { name: '有规格', type: 'bar', data: categories.map(c => stats[c].spec), itemStyle: { color: '#10b981' } },
                    { name: '有备注', type: 'bar', data: categories.map(c => stats[c].remark), itemStyle: { color: '#f59e0b' } }
                ]
            });
        }

        function renderTable() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            
            filteredData.forEach((row) => {
                const realIndex = rawData.indexOf(row);
                const tr = document.createElement('tr');
                let html = '';
                row.forEach((cell, colIndex) => {
                    let displayContent = highlightText(cell);
                    if (isAdmin) {
                        html += `<td class="editable" contenteditable="true" 
                                    onfocus="this.innerText=rawData[${realIndex}][${colIndex}]" 
                                    onblur="updateCell(${realIndex}, ${colIndex}, this.innerText)">${displayContent}</td>`;
                    } else {
                        html += `<td>${displayContent}</td>`;
                    }
                });
                
                if (isAdmin) {
                    html += `<td class="admin-col"><span class="del-btn" onclick="deleteRow(${realIndex})">删除</span></td>`;
                } else {
                    html += `<td class="admin-col" style="display:none;"></td>`;
                }
                
                tr.innerHTML = html;
                tbody.appendChild(tr);
            });
            
            const adminCols = document.querySelectorAll('.admin-col');
            adminCols.forEach(col => col.style.display = isAdmin ? 'table-cell' : 'none');
        }

        function updateCell(realIndex, colIndex, value) {
            const safeVal = value.trim();
            if (rawData[realIndex][colIndex] !== safeVal) {
                rawData[realIndex][colIndex] = safeVal;
                autoSave(); 
                handleSearch(); 
            } else {
                renderTable();
            }
        }

        function addRow() {
            const newRow = [`WZ-NEW-${Math.floor(Math.random()*10000)}`, '电气件', '新入库物料', '', ''];
            rawData.unshift(newRow);
            autoSave();
            if (currentSearchTerm) { document.getElementById('search-input').value = ''; }
            handleSearch();
            document.querySelector('.table-wrapper').scrollTop = 0;
            showToast('➕ 新物料已生成在表格顶部');
        }

        function deleteRow(realIndex) {
            if (confirm('警告：此操作不可逆，确定销毁此条数据吗？')) {
                rawData.splice(realIndex, 1);
                autoSave();
                handleSearch();
                showToast('🗑️ 数据已被销毁');
            }
        }

        function triggerDownload(content, filename, mimeType) {
            const blob = new Blob([content], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = filename;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function exportToCSV() {
            let csvContent = "\uFEFF物料编码,分类,物料名称,规格/参数,备注\n";
            filteredData.forEach(row => {
                let formattedRow = row.map(cell => {
                    let safeCell = String(cell || '').replace(/"/g, '""');
                    if (safeCell.includes(',') || safeCell.includes('\n') || safeCell.includes('"')) return `"${safeCell}"`;
                    return safeCell;
                });
                csvContent += formattedRow.join(',') + "\n";
            });
            triggerDownload(csvContent, '旺州仓库_报表.csv', 'text/csv;charset=utf-8;');
            showToast('⬇️ Excel 开始下载');
        }

        function exportToMD() {
            let mdContent = `# 旺州仓库物料数据\n\n`;
            mdContent += `> 共计 ${filteredData.length} 条记录\n\n`;
            mdContent += "| 物料编码 | 分类 | 物料名称 | 规格/参数 | 备注 |\n|---|---|---|---|---|\n";
            filteredData.forEach(row => {
                let formattedRow = row.map(cell => String(cell || '').replace(/\|/g, '&#124;').replace(/\n/g, '<br>'));
                mdContent += `| ${formattedRow.join(' | ')} |\n`;
            });
            triggerDownload(mdContent, '旺州仓库_报表.md', 'text/markdown;charset=utf-8;');
            showToast('⬇️ Markdown 开始下载');
        }

        function showLogin() { document.getElementById('login-modal').style.display = 'flex'; document.getElementById('login-err').style.display = 'none'; }
        function hideLogin() { document.getElementById('login-modal').style.display = 'none'; }
        
        function verifyLogin() {
            if (document.getElementById('username').value === '旺州仓库' && document.getElementById('password').value === '2530049443') {
                isAdmin = true;
                hideLogin();
                document.getElementById('user-status').innerHTML = '<span style="color:var(--danger)">编辑已开启</span>';
                document.getElementById('user-status').style.color = 'var(--accent)';
                document.getElementById('login-btn').style.display = 'none';
                document.getElementById('logout-btn').style.display = 'flex';
                document.getElementById('add-btn').style.display = 'flex';
                document.getElementById('save-btn').style.display = 'flex';
                document.getElementById('edit-hint').style.display = 'inline';
                renderTable(); 
                showToast('🔑 管理员授权成功');
            } else {
                document.getElementById('login-err').style.display = 'block';
            }
        }

        function logout() {
            isAdmin = false;
            document.getElementById('user-status').innerText = '访客模式';
            document.getElementById('user-status').style.color = 'var(--text-sub)';
            document.getElementById('login-btn').style.display = 'flex';
            document.getElementById('logout-btn').style.display = 'none';
            document.getElementById('add-btn').style.display = 'none';
            document.getElementById('save-btn').style.display = 'none';
            document.getElementById('edit-hint').style.display = 'none';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            renderTable(); 
            showToast('🔒 已退出管理员');
        }
    </script>
</body>
</html>
